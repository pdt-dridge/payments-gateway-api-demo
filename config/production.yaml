# Production Configuration - Payments Gateway API
# Last Updated: 2026-03-19
# Environment: Production

api:
  name: payments-gateway
  version: v1.2.3
  environment: production
  port: 8080
  host: 0.0.0.0
  base_url: https://api.payments.example.com

  # Request handling
  max_request_size: 10MB
  request_timeout: 30s
  idle_timeout: 120s
  read_timeout: 30s
  write_timeout: 30s

# Payment Providers
payment_providers:
  stripe:
    enabled: true
    api_key_secret: stripe-api-key
    api_version: "2023-10-16"
    endpoint: https://api.stripe.com
    timeout: 15s
    retry_attempts: 3
    retry_backoff: exponential
    webhook_secret: stripe-webhook-secret

  paypal:
    enabled: true
    client_id_secret: paypal-client-id
    client_secret_secret: paypal-client-secret
    endpoint: https://api.paypal.com
    mode: live
    timeout: 15s
    retry_attempts: 3

  bank_partner:
    enabled: true
    api_key_secret: bank-partner-key
    endpoint: https://api.bankpartner.com
    timeout: 20s
    retry_attempts: 2

# Database Configuration
database:
  host: payments-db.prod.internal
  port: 5432
  name: payments_prod
  user: payments
  password_secret: db-password
  ssl_mode: require

  # Connection Pool
  pool:
    min_connections: 10
    max_connections: 50
    max_idle_time: 300s
    max_lifetime: 3600s
    health_check_interval: 30s

  # Performance
  statement_timeout: 30s
  idle_in_transaction_timeout: 60s

  # Replication
  read_replicas:
    - host: payments-db-replica-1.prod.internal
      port: 5432
    - host: payments-db-replica-2.prod.internal
      port: 5432

# Cache Configuration
cache:
  type: redis
  host: payments-cache.prod.internal
  port: 6379
  password_secret: redis-password
  db: 0

  # Connection Pool
  pool_size: 100
  min_idle_connections: 10

  # TTL Settings
  default_ttl: 300s
  payment_status_ttl: 60s
  customer_data_ttl: 600s

  # Cluster Mode
  cluster_enabled: true
  cluster_nodes:
    - payments-cache-1.prod.internal:6379
    - payments-cache-2.prod.internal:6379
    - payments-cache-3.prod.internal:6379

# Monitoring & Observability
monitoring:
  enabled: true

  # Metrics
  metrics:
    enabled: true
    port: 9090
    path: /metrics

  # Logging
  logging:
    level: info
    format: json
    output: stdout

    # Log Sampling (reduce volume)
    sampling:
      enabled: true
      initial: 100
      thereafter: 10

  # Tracing
  tracing:
    enabled: true
    provider: jaeger
    endpoint: http://jaeger-collector.monitoring:14268/api/traces
    sample_rate: 0.1  # 10% sampling

  # Health Checks
  health:
    enabled: true
    path: /health
    liveness_path: /health/live
    readiness_path: /health/ready

# Alert Thresholds
alerts:
  payment_success_rate:
    warning: 97
    critical: 95

  api_latency_p95:
    warning: 1000  # ms
    critical: 2000  # ms

  api_latency_p99:
    warning: 3000  # ms
    critical: 5000  # ms

  error_rate:
    warning: 1  # percent
    critical: 5  # percent

  database_connections:
    warning: 40
    critical: 45

# Security
security:
  # API Keys
  api_key_rotation_days: 90

  # Rate Limiting
  rate_limiting:
    enabled: true
    requests_per_minute: 1000
    burst: 2000

  # CORS
  cors:
    enabled: true
    allowed_origins:
      - https://dashboard.example.com
      - https://app.example.com
    allowed_methods:
      - GET
      - POST
      - PUT
      - DELETE
    allowed_headers:
      - Authorization
      - Content-Type
    max_age: 3600

  # TLS
  tls:
    enabled: true
    min_version: "1.2"
    cert_secret: tls-cert
    key_secret: tls-key

# Circuit Breaker
circuit_breaker:
  enabled: true
  failure_threshold: 5
  success_threshold: 2
  timeout: 60s
  max_requests: 3

# Feature Flags
features:
  new_payment_flow: true
  fraud_detection_v2: true
  async_webhooks: true
  payment_retry: true
  multi_currency: true

# Retry Configuration
retry:
  max_attempts: 3
  initial_interval: 1s
  max_interval: 10s
  multiplier: 2.0

# Webhooks
webhooks:
  enabled: true
  timeout: 10s
  retry_attempts: 5
  retry_backoff: exponential
  max_retry_interval: 3600s

# Maintenance Mode
maintenance:
  enabled: false
  message: "System maintenance in progress"
  allowed_ips: []

# Resource Limits
resources:
  cpu_limit: "2000m"
  memory_limit: "4Gi"
  cpu_request: "1000m"
  memory_request: "2Gi"

# Autoscaling
autoscaling:
  enabled: true
  min_replicas: 5
  max_replicas: 20
  target_cpu_utilization: 70
  target_memory_utilization: 80

# Disaster Recovery
disaster_recovery:
  backup_enabled: true
  backup_schedule: "0 2 * * *"  # 2 AM daily
  backup_retention_days: 30
  point_in_time_recovery: true
